services:
  postgres:
    image: postgres:16
    container_name: ogindexer-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ogindexer
      POSTGRES_PASSWORD: ogindexer
      POSTGRES_DB: ogindexer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
